services:
  db:
    image: pgvector/pgvector:pg16
    container_name: drape-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: drape
    ports:
      - "5433:5432"
    volumes:
      - drape_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d drape"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  drape_pgdata:
