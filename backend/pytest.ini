[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async tests in async-mode=auto don't need explicit @pytest.mark.asyncio.
asyncio_mode = auto

# Quieter output by default; -v / -vv override.
addopts =
    -ra
    --strict-markers
    --tb=short

# Custom markers (avoids `--strict-markers` warnings).
markers =
    slow: tests that take >1s; can be skipped with -m "not slow"
    integration: full HTTP round-trip tests (vs unit tests on services)
